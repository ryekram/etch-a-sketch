<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>etch-a-sketch</title>
  </head>
  <body>
    <div id="App">
      <h1 class="title">Etch-a-Sketch</h1>
      <div class="sketch__area">
        <div class="sketch__controls">
          <input id="color__picker" type="color" value="#adadad" />
          <button class="btn btn-control rainbow__btn">Rainbow Color</button>
          <button class="btn btn-control eraser__btn">Eraser</button>
          <button class="btn btn-control clear__btn">Clear</button>
          <button
            popovertarget="mypopover"
            class="btn btn-control prompt__button"
          >
            Custom Size
          </button>
          <div class="divider">
            <span>or</span>
          </div>
        <div class="slider__container">
          <span class="slider__span">16x16</span>
          <input type="range" min="1" max="99" value="50" class="slider" id="grid__slider">
        </div>
        </div>

        <div class="grid__container"></div>
      </div>
    </div>
    <div popover="auto" id="mypopover">
      <div class="input__group">
        <input
          type="text"
          id="input__size"
          class="input__base"
          placeholder="Ex: 24, 64"
        />
        <span class="error__size-span"></span>
      </div>
      <button class="btn submit__btn">Submit</button>
    </div>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
