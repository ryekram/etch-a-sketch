<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>etch-a-sketch</title>
  </head>
  <body>
    <div id="App">
      <div class="sketch__area">
        <div class="sketch__controls">
          <div class="btn btn-control">Color Picker</div>
          <div class="btn btn-control">Eraser</div>
          <div class="btn btn-control">Clear</div>
          <button popovertarget="mypopover" class="btn btn-control prompt__button">
            Custom Size
          </button>
        </div>

        <div class="grid__container"></div>
      </div>
    </div>
    <div popover="auto" id="mypopover">
      <div class="input__group">
        <input
          type="text"
          id="input__size"
          class="input__base"
          placeholder="Ex: 24, 64"
        />
        <span class="error__size-span"></span>
      </div>
      <button class="btn submit__btn">Submit</button>
    </div>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
